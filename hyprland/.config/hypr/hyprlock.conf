general {
    #hide_cursor = true
    immediate_render = true
    fail_timeout = 2000
}

# ---------- Background ----------
background {
    monitor =
    path = /home/kazro/.config/hypr/hyprlock_Background.png
    color = rgba(12,12,12,1.0)   # fallback color
    #blur_passes = 3
    #blur_size = 10
    contrast = 1.02
    brightness = 0.88
    vibrancy = 0.10
    vibrancy_darkness = 0.02
    zindex = -1
}

# ---------- Clock (HH : MM) ----------
label {
    monitor =
    # 24-hour HH:MM with a centered colon spacing. update every second.
    text = cmd[update:1000] echo "<span font='JetBrainsMono Nerd Font Mono' size='xx-large'>$(date '+%I:%M')</span>"
    color = rgba(233, 233, 233, 1)
    font_size = 100
    font_family = "JetBrainsMono Nerd Font Mono"
    position = 0, 250
    halign = center
    valign = center
    zindex = 0
}

# ---------- Date (Weekday - DD) ----------
label {
    monitor =
    # e.g. "Wednesday - 07"
    text = cmd[update:60000] echo "<span font='JetBrainsMono Nerd Font Mono' size='medium'>$(date '+%A - %d')</span>"
    color = rgba(233, 233, 233, 1)
    font_size = 20
    font_family = "JetBrainsMono Nerd Font Mono"
    position = 0, 150
    halign = center
    valign = center
    zindex = 0
}

# ---------- Password input field ----------
input-field {
    monitor =
    size = 340, 48               # width, height in px (or use %, e.g. 40%, 6%)
    roundness = 10
    outline_thickness = 2
    inner_color = rgba(0,0,0,0.28)
    outer_color = rgba(255,255,255,0.12)
    placeholder_text = "Enter password"
    placeholder_color = rgba(255,255,255,0.36)
    font_color = rgba(255,255,255,0.96)
    check_color = rgba(100,200,255,0.85)
    fail_color = rgba(255,80,80,0.85)
    fade_on_empty = true
    dots_size = 0.26
    dots_spacing = 0.30
    position = 0, -300
    halign = center
    valign = center
    zindex = 1
}

#user label
label {
    monitor =
    text =     $USER
    color = rgba(233, 233, 233, 1)
    font_size = 14
    font_family = "JetBrainsMono Nerd Font Mono"
    position = 0, -450
    halign = center
    valign = center
    zindex = 2
}


# Reboot
label {
    monitor =
    text = <span> </span>
    color = rgba(255, 255, 255, 0.6)
    font_family = "JetBrainsMono Nerd Font Mono"
    font_size = 17
    onclick = reboot now
    position = 920, 10
    halign = center
    valign = bottom
}

# Power off
label {
    monitor =
    text = <span> </span>
    font_family = "JetBrainsMono Nerd Font Mono"
    color = rgba(255, 255, 255, 0.6)
    font_size = 17
    onclick = shutdown now
    position = 830, 10
    halign = center
    valign = bottom
}

# Suspend
label {
    monitor =
    text = <span>󰤄 </span>
    color = rgba(255, 255, 255, 0.6)
    font_size = 17
    onclick = systemctl suspend
    position = 880, 10
    halign = center
    valign = bottom
}
# Suspend
label {
    monitor =
    text = <span>󰈆 </span>
    color = rgba(255, 255, 255, 0.6)
    font_size = 17
    onclick = hyprctl dispatch exit
    position = 780, 10
    halign = center
    valign = bottom
}
